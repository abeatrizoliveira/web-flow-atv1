<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico" />
    <link rel="stylesheet" href="/assets/css/main.css">
    <title>DSM | login</title>
</head>

<body>
    <main class="card">
        <h1 class="title">Login</h1>
        <form action="#" class="auth-form">
            <label>E-mail</label>
            <input type="email" required>
            <label>Senha</label>
            <input type="password" required>
        </form>
        <div class="actions">
            <button class="btn-link">Entrar</button>
            <a href="/cadastro" class="btn-link">Ir para cadastrar</a>
            <a href="/" class="btn-link btn-secondary">Voltar</a>
        </div>
    </main>
</body>

</html>
